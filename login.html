<!DOCTYPE html>
<html lang="fa" >
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link rel="stylesheet" href="./src/output.css">
    <!-- <link rel="stylesheet" href="./css/home_style.css"> -->
    <link rel="stylesheet" href="./css/login_style.css">
    <link rel="stylesheet" href="./css/font.css">
    <link rel="stylesheet" href="./dist/output.css">
</head>
<body>
    <div class="gradient-background bg">
        <img src="./images/signals.svg" id="signal1">
        <img src="./images/signals.svg" id="signal2">
        <img src="./images/signals.svg" id="signal3">
        <img src="./images/signals.svg" id="signal4">
        <img src="./images/signals.svg" id="signal5">
        <img src="./images/signals.svg" id="signal6">
        <img src="./images/signals.svg" id="signal7">
        <img src="./images/signals.svg" id="signal8">
        <div class="login-form">
            <h1>ورود به پنل ادمین</h1>
            <form>
                <label class="input input-bordered input-primary w-full max-w-xs flex items-center gap-2" style="background-color: rgb(231, 229, 229);">
                    <input id="email" type="text" class="grow text-end" placeholder="ایمیل" style="color: #494949;"/>
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      viewBox="0 0 16 16"
                      fill="currentColor"
                      class="h-4 w-4 opacity-70">
                      <path
                        d="M2.5 3A1.5 1.5 0 0 0 1 4.5v.793c.026.009.051.02.076.032L7.674 8.51c.206.1.446.1.652 0l6.598-3.185A.755.755 0 0 1 15 5.293V4.5A1.5 1.5 0 0 0 13.5 3h-11Z" />
                      <path
                        d="M15 6.954 8.978 9.86a2.25 2.25 0 0 1-1.956 0L1 6.954V11.5A1.5 1.5 0 0 0 2.5 13h11a1.5 1.5 0 0 0 1.5-1.5V6.954Z" />
                    </svg>
                  </label>                    

                  <label class="input input-bordered input-primary w-full max-w-xs flex items-center gap-2" style="background-color: rgb(231, 229, 229);">
                    <input id="password" type="password" class="grow text-end" placeholder="رمز عبور" style="color: #494949;"/>
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      viewBox="0 0 16 16"
                      fill="currentColor"
                      class="h-4 w-4 opacity-70">
                      <path
                        fill-rule="evenodd"
                        d="M14 6a4 4 0 0 1-4.899 3.899l-1.955 1.955a.5.5 0 0 1-.353.146H5v1.5a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1-.5-.5v-2.293a.5.5 0 0 1 .146-.353l3.955-3.955A4 4 0 1 1 14 6Zm-4-2a.75.75 0 0 0 0 1.5.5.5 0 0 1 .5.5.75.75 0 0 0 1.5 0 2 2 0 0 0-2-2Z"
                        clip-rule="evenodd" />
                    </svg>
                  </label>
                </form>
                <button class="login-button">ورود</button>
        </div>
    </div>    
    <div class="toast toast-end">
      <div class="alert alert-error" style="background-color: #fce9e5; border: 2px solid #dd1301; display: none;">
        <span style="color: #dd1301;"></span>
      </div>
      <div class="alert alert-success" style="background-color: #cdffdf; border: 2px solid #20cb20b1; display: none;">
        <span style="color: #20cb20b1; font-size: 1rem; font-weight: bold;">ورود با موفقیت انجام شد</span>
      </div>
    </div>    
    <script src="./JS/login.js"></script>  
</body>
</html>
